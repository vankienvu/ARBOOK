<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng ký tài khoản - AR Textbook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css?v=1.3">
    
    <!-- GSAP for creative motion design -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="/js/cyber-hud.js" defer></script>

    <style>
        .auth-panel {
            background: rgba(10, 6, 20, 0.55) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid var(--border-color) !important;
        }
        .auth-story {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.12) 0%, rgba(236, 72, 153, 0.05) 100%), #0d0716 !important;
        }
    </style>
</head>
<body class="auth-body" style="background: radial-gradient(circle at center, #150f24 0%, #050209 100%); overflow-x: hidden;">
<canvas id="space-canvas" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; pointer-events:none;"></canvas>
<main class="auth-layout cyber-panel" style="background: rgba(14, 9, 24, 0.7) !important; opacity: 0;">
    <section class="auth-story" style="opacity: 0; transform: translateX(-30px);">
        <a class="brand-mark" href="/">
            <span class="brand-cube" aria-hidden="true"></span>
            <span class="text-glow-primary">ARBook</span>
        </a>
        <h1 class="text-glow-primary" style="font-size: 2.5rem; font-weight: 800; margin-top: 40px;">Tham gia kỷ nguyên học tập 3D</h1>
        <p class="text-secondary small">Đăng ký tài khoản mới để bắt đầu khám phá các mô hình khoa học trực quan trong sách giáo khoa của bạn, hoặc tạo lớp học ảo để giao bài tập cho học sinh.</p>
        <div class="auth-marker-stack" aria-hidden="true" style="margin-top: 20px;">
            <img src="/img/markers/BIO_CELL_001.png" alt="Bio Cell Marker" style="border: 1px solid var(--border-color); border-radius: var(--radius-md); transition: all 0.3s ease;">
            <img src="/img/markers/HEART_001.png" alt="Heart Marker" style="border: 1px solid var(--border-color); border-radius: var(--radius-md); transition: all 0.3s ease;">
        </div>
    </section>

    <section class="auth-panel p-5" style="opacity: 0; transform: translateX(30px);">
        <p class="eyebrow mb-1">Hệ thống bảo mật</p>
        <h2 class="text-white font-weight-bold mb-4" style="font-size: 1.6rem;">Đăng Ký Tài Khoản</h2>
        
        <div th:if="${error}" class="alert alert-danger-soft p-3 mb-3 text-start small" style="border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 8px; background: rgba(239, 68, 68, 0.05); color: #f87171;">
            <strong class="text-white">Lỗi:</strong> <span th:text="${error}">Thông báo lỗi</span>
        </div>

        <form method="post" action="/register" class="vstack gap-3 text-start register-form">
            <label class="d-flex flex-column gap-1 gsap-form-item">
                <span class="text-secondary small font-weight-bold">Họ và tên</span>
                <input class="form-control" type="text" name="fullName" placeholder="Nguyễn Văn A" required>
            </label>
            <label class="d-flex flex-column gap-1 gsap-form-item">
                <span class="text-secondary small font-weight-bold">Email (Tài khoản)</span>
                <input class="form-control" type="email" name="email" placeholder="example@artextbook.com" required>
            </label>
            <label class="d-flex flex-column gap-1 gsap-form-item">
                <span class="text-secondary small font-weight-bold">Mật khẩu</span>
                <input class="form-control" type="password" name="password" placeholder="••••••" required>
            </label>
            <label class="d-flex flex-column gap-1 gsap-form-item">
                <span class="text-secondary small font-weight-bold">Số điện thoại (tùy chọn)</span>
                <input class="form-control" type="text" name="phone" placeholder="0901234567">
            </label>
            <label class="d-flex flex-column gap-1 gsap-form-item">
                <span class="text-secondary small font-weight-bold">Vai trò của bạn</span>
                <select class="form-select" name="role" required>
                    <option value="STUDENT" class="bg-dark">Học sinh (Student)</option>
                    <option value="TEACHER" class="bg-dark">Giáo viên (Teacher)</option>
                </select>
            </label>
            <button class="btn btn-primary w-100 mt-3 gsap-form-item magnetic-btn" type="submit">Đăng ký ngay</button>
            
            <p class="text-center small text-secondary mt-3 mb-0 gsap-form-item">
                Đã có tài khoản? <a href="/login" class="text-white font-weight-bold" style="text-decoration: underline;">Đăng nhập</a>
            </p>
        </form>
    </section>
</main>

<script>
    window.addEventListener('load', () => {
        const tl = gsap.timeline();
        
        tl.to("main", {
            opacity: 1,
            duration: 0.4
        });
        
        tl.to(".auth-story", {
            opacity: 1,
            x: 0,
            duration: 0.8,
            ease: "power3.out"
        }, "-=0.2");

        tl.to(".auth-panel", {
            opacity: 1,
            x: 0,
            duration: 0.8,
            ease: "power3.out"
        }, "-=0.8");

        tl.from(".gsap-form-item", {
            opacity: 0,
            y: 20,
            duration: 0.6,
            stagger: 0.08,
            ease: "power2.out"
        }, "-=0.4");
        
        // Float effect for markers
        gsap.to(".auth-marker-stack img:first-child", {
            y: -8,
            rotation: -5,
            duration: 4,
            repeat: -1,
            yoyo: true,
            ease: "sine.inOut"
        });
        
        gsap.to(".auth-marker-stack img:last-child", {
            y: 8,
            rotation: 10,
            duration: 4.5,
            repeat: -1,
            yoyo: true,
            ease: "sine.inOut"
        });
    });
</script>
</body>
</html>

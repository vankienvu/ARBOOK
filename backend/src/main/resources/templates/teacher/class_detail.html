<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chi Tiết Lớp Học - AR Textbook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css?v=1.2">
    <!-- Chart.js for Teacher Analytics Dashboard -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- GSAP for creative motion design -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="/js/cyber-hud.js" defer></script>
</head>
<body class="app-body">
<header class="topbar app-topbar">
    <nav class="container-fluid app-nav">
        <a class="brand-mark" href="/">
            <span class="brand-cube" aria-hidden="true"></span>
            <span class="text-glow-primary">AR Textbook Workspace</span>
        </a>
        <div class="nav-actions">
            <a class="btn btn-soft btn-sm px-3 magnetic-btn" href="/student/scan" style="background: rgba(168, 85, 247, 0.15) !important; border-color: rgba(168, 85, 247, 0.3) !important; color: #fff !important;">Quét AR</a>
            <a class="btn btn-ghost btn-sm magnetic-btn" href="/guide">Hướng dẫn</a>
            <form method="post" action="/logout" sec:authorize="isAuthenticated()" class="d-inline">
                <button class="btn btn-danger-soft btn-sm magnetic-btn" type="submit">Đăng xuất</button>
            </form>
        </div>
    </nav>
</header>

<main class="app-shell" style="opacity: 0;">
    <aside class="side-rail animate-aside" aria-label="Điều hướng workspace">
        <a href="/teacher/dashboard" class="is-active magnetic-btn">
            <span>Giáo Viên</span>
            <small>Lớp học, bài tập giao</small>
        </a>
    </aside>

    <section class="workspace animate-workspace">
        <div class="workspace-hero">
            <div>
                <p class="eyebrow">Teacher workspace</p>
                <h1 th:text="${title}">Chi Tiết Lớp Học</h1>
                <p th:text="${subtitle}">Danh sách học sinh và phân tích kết quả học tập.</p>
            </div>
            <div class="workspace-status">
                <span>Giáo viên</span>
            </div>
        </div>

        <div class="row g-4" style="margin-bottom: 2rem;">
            <!-- Roster Table -->
            <div class="col-lg-8">
                <section class="data-panel cyber-panel h-100 mb-0 panel-roster">
                    <div class="panel-heading">
                        <h2>Danh Sách Học Sinh</h2>
                    </div>
                    <div class="table-responsive">
                        <table class="table app-table mb-0 align-middle">
                            <thead>
                            <tr>
                                <th>Học sinh</th>
                                <th>Email liên hệ</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="row : ${rows}">
                                <td><strong class="text-white" th:text="${row['label']}">Tên học sinh</strong></td>
                                <td th:text="${row['value']}">Email</td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(rows)}">
                                <td colspan="2" class="text-center text-muted p-3">Chưa có học sinh nào trong lớp.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>

            <!-- Class Charts -->
            <div class="col-lg-4">
                <section class="data-panel cyber-panel h-100 mb-0 panel-chart">
                    <div class="panel-heading">
                        <h2>Phổ Điểm Quiz</h2>
                    </div>
                    <div class="p-4 d-flex justify-content-center" style="position: relative; height: 260px;">
                        <canvas id="quizClassChart"></canvas>
                    </div>
                </section>
            </div>
        </div>
    </section>
</main>

<script th:inline="javascript">
    const analytics = [[${analytics}]];
    if (analytics) {
        const quizLabels = analytics.quizDistribution.map(d => d.label);
        const quizValues = analytics.quizDistribution.map(d => d.value);
        new Chart(document.getElementById('quizClassChart'), {
            type: 'bar',
            data: {
                labels: quizLabels.length > 0 ? quizLabels : ['Dưới 5', '5-6.9', '7-8.9', '9-10'],
                datasets: [{
                    label: 'Số học sinh',
                    data: quizValues.length > 0 ? quizValues : [0, 1, 3, 2],
                    backgroundColor: 'rgba(236, 72, 153, 0.65)',
                    borderColor: '#ec4899',
                    borderWidth: 1.5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                }
            }
        });
    }

    window.addEventListener('load', () => {
        gsap.to("main", { opacity: 1, duration: 0.5 });
        gsap.from(".animate-aside", { x: -30, opacity: 0, duration: 0.6, ease: "power2.out" });
        gsap.from(".animate-workspace", { x: 30, opacity: 0, duration: 0.6, ease: "power2.out" }, "-=0.4");
        
        gsap.from(".panel-roster", { opacity: 0, y: 20, duration: 0.7, ease: "power2.out", delay: 0.2 });
        gsap.from(".panel-chart", { opacity: 0, y: 20, duration: 0.7, ease: "power2.out", delay: 0.4 }, "-=0.5");
    });
</script>
</body>
</html>

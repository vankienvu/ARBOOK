spring.application.name=AR Textbook Backend
spring.config.import=optional:file:.env[.properties]

server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/arbook?options=-c%20TimeZone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.thymeleaf.cache=false
spring.servlet.multipart.max-file-size=${APP_UPLOAD_MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${APP_UPLOAD_MAX_REQUEST_SIZE:50MB}

app.demo-seed.enabled=${APP_DEMO_SEED_ENABLED:true}
app.backend-base-url=${APP_BACKEND_BASE_URL:http://localhost:8080}

# VNPAY Integration
app.vnpay.tmn-code=${APP_VNPAY_TMN_CODE:1DFCR9HR}
app.vnpay.hash-secret=${APP_VNPAY_HASH_SECRET:KOUWNAMC7XZG2KHS3PVNK5E5AM2O10WP}
app.vnpay.url=${APP_VNPAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}

# Unity Client Key Configuration
app.unity.client-key=${APP_UNITY_CLIENT_KEY:UnitySecretKey123}

# Google Cloud Storage Configuration
app.gcp.storage.enabled=${APP_GCP_STORAGE_ENABLED:false}
app.gcp.storage.project-id=${APP_GCP_STORAGE_PROJECT_ID:}
app.gcp.storage.bucket-name=${APP_GCP_STORAGE_BUCKET_NAME:}
app.gcp.storage.credentials-json=${APP_GCP_STORAGE_CREDENTIALS_JSON:}

# Storage Provider Settings (local, gcs, s3)
app.storage.provider=${APP_STORAGE_PROVIDER:local}

# AWS S3 / Compatible S3 Storage Configuration
app.s3.bucket-name=${APP_S3_BUCKET_NAME:}
app.s3.region=${APP_S3_REGION:us-east-1}
app.s3.access-key=${APP_S3_ACCESS_KEY:}
app.s3.secret-key=${APP_S3_SECRET_KEY:}
app.s3.endpoint-url=${APP_S3_ENDPOINT_URL:}

# Cloudinary Storage Configuration
app.cloudinary.cloud-name=${APP_CLOUDINARY_CLOUD_NAME:}
app.cloudinary.api-key=${APP_CLOUDINARY_API_KEY:}
app.cloudinary.api-secret=${APP_CLOUDINARY_API_SECRET:}

# OpenAI AI Assistant Settings
app.openai.enabled=${APP_OPENAI_ENABLED:false}
app.openai.api-key=${APP_OPENAI_API_KEY:}

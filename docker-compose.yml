version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: arbook-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: arbook
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arbook-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/arbook?options=-c%20TimeZone=UTC
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password123
      APP_DEMO_SEED_ENABLED: "true"
      APP_UPLOAD_DIR: /app/uploads
      APP_BACKEND_BASE_URL: http://localhost:8080
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - db

volumes:
  postgres_data:
  uploads_data:
